<!-- Filters Logic -->

<div class="filters" id="filters">
<button id="toggleFilters">Menu</button>
<!-- Itinerary Mode button moved up, right under Menu -->
<button id="itineraryMode">
		Enter Itinerary Mode
	</button>
<div class="search-toggle-container">
<input id="placeSearch" placeholder="Search…" type="search"/>
<button id="toggleSubcats">
	    Deselect All
	  </button>
</div>
<div class="panel-container" id="panelContainer"></div>
<div id="itineraryContainer">

		  Create New Itinerary
		</button>

		  Modify Itineraries
		</button>

		  View Itineraries
		</button>

		  <input id="modalDay" min="1" required="" type="number"/>
</label>

		  Date  
		  <input id="modalDate" required="" type="date"/>
</label>
<label>
		Time  
		<input id="modalTime" placeholder="e.g. 15:00, after breakfast" type="text"/>
</label>

		  <textarea id="modalNotes" rows="2"></textarea>
</label>

<button id="modalNext" type="submit">Next</button>
</div>
</form>

<button id="insertConfirm" type="button">Add</button>
</div>
</div>
</div>

</label>
<div class="create-itin-actions">
<button id="cancelCreateItin" type="button">Cancel</button>
<button id="submitCreateItin" type="submit">Create</button>
</div>
</form>

</div>

</div>
</div>

      Time

</label>

      Notes
      <textarea id="editNotes" rows="3"></textarea>
</label>
<div class="edit-item-actions">
<button id="editCancel" type="button">Cancel</button>
<button id="editSave" type="submit">Save</button>
</div>
</form>
